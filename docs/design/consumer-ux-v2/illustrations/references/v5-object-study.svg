<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" fill="none" aria-labelledby="title desc">
  <title id="title">Reference v5  -  Object study</title>
  <desc id="desc">Row of five stylised pantry object forms  -  Claude reference</desc>
  <rect width="320" height="240" fill="#f7f5f0"/>
  <!-- object 1  -  tall bottle -->
  <rect x="52" y="72" width="18" height="96" rx="2" fill="#5a6b52" stroke="#8a857e" stroke-width="1"/>
  <rect x="54" y="108" width="14" height="4" fill="#4a5a44"/>
  <rect x="56" y="64" width="10" height="10" rx="1" fill="#6b7d62" stroke="#8a857e" stroke-width="1"/>
  <rect x="58" y="56" width="6" height="8" rx="1" fill="#5a6b52" stroke="#8a857e" stroke-width="0.75"/>
  <!-- object 2  -  jar -->
  <rect x="96" y="96" width="28" height="72" rx="4" fill="#d4cfc4" stroke="#8a857e" stroke-width="1"/>
  <ellipse cx="110" cy="96" rx="14" ry="4" fill="#c8c0b0" stroke="#8a857e" stroke-width="0.75"/>
  <line x1="98" y1="120" x2="122" y2="120" stroke="#b8b2a8" stroke-width="1"/>
  <!-- object 3  -  tall box -->
  <rect x="148" y="64" width="32" height="104" fill="#8a7d6e" stroke="#8a857e" stroke-width="1"/>
  <rect x="146" y="58" width="36" height="8" fill="#726758" stroke="#8a857e" stroke-width="0.75"/>
  <line x1="150" y1="84" x2="178" y2="84" stroke="#726758" stroke-width="0.75"/>
  <line x1="150" y1="104" x2="178" y2="104" stroke="#726758" stroke-width="0.75"/>
  <line x1="150" y1="124" x2="178" y2="124" stroke="#726758" stroke-width="0.75"/>
  <line x1="150" y1="144" x2="178" y2="144" stroke="#726758" stroke-width="0.75"/>
  <!-- object 4  -  small tin -->
  <rect x="200" y="136" width="36" height="32" fill="#94a58c" stroke="#8a857e" stroke-width="1"/>
  <rect x="198" y="130" width="40" height="8" fill="#6b7d62" stroke="#8a857e" stroke-width="0.75"/>
  <!-- object 5  -  slender vial -->
  <rect x="260" y="80" width="8" height="88" rx="2" fill="#94a58c" stroke="#8a857e" stroke-width="1"/>
  <rect x="258" y="72" width="12" height="10" rx="1" fill="#6b7d62" stroke="#8a857e" stroke-width="0.75"/>
</svg>

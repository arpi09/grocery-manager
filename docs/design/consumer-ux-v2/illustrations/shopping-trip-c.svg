<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" fill="none" aria-labelledby="title desc">
  <title id="title">Shopping trip — variant C</title>
  <desc id="desc">Shelf with fewer remaining items — checked-off feel through faded blocks</desc>
  <rect width="320" height="240" fill="#f7f5f0"/>
  <rect x="48" y="36" width="224" height="168" fill="none" stroke="#8a857e" stroke-width="1.5"/>
  <line x1="48" y1="92" x2="272" y2="92" stroke="#8a857e" stroke-width="1.5"/>
  <line x1="48" y1="148" x2="272" y2="148" stroke="#8a857e" stroke-width="1.5"/>
  <!-- checked (faded ghost outlines) -->
  <rect x="58" y="52" width="14" height="36" fill="#edeae4" stroke="#d4cfc4" stroke-width="1" stroke-dasharray="3 2"/>
  <rect x="78" y="54" width="18" height="34" fill="#edeae4" stroke="#d4cfc4" stroke-width="1" stroke-dasharray="3 2"/>
  <rect x="102" y="50" width="12" height="38" fill="#edeae4" stroke="#d4cfc4" stroke-width="1" stroke-dasharray="3 2"/>
  <rect x="168" y="52" width="28" height="36" fill="#edeae4" stroke="#d4cfc4" stroke-width="1" stroke-dasharray="3 2"/>
  <rect x="58" y="100" width="32" height="44" fill="#edeae4" stroke="#d4cfc4" stroke-width="1" stroke-dasharray="3 2"/>
  <rect x="96" y="106" width="22" height="38" fill="#edeae4" stroke="#d4cfc4" stroke-width="1" stroke-dasharray="3 2"/>
  <!-- remaining items -->
  <rect x="180" y="98" width="26" height="46" fill="#8a7d6e" stroke="#8a857e" stroke-width="1"/>
  <rect x="212" y="104" width="20" height="40" fill="#6b7d62" stroke="#8a857e" stroke-width="1"/>
  <rect x="238" y="106" width="24" height="38" fill="#d4cfc4" stroke="#8a857e" stroke-width="1"/>
  <rect x="120" y="156" width="36" height="40" fill="#6b7d62" stroke="#8a857e" stroke-width="1"/>
  <rect x="168" y="160" width="22" height="36" fill="#8a7d6e" stroke="#8a857e" stroke-width="1"/>
  <rect x="200" y="158" width="30" height="38" fill="#d4cfc4" stroke="#8a857e" stroke-width="1"/>
</svg>

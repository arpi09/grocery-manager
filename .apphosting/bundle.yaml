# SvelteKit + adapter-node output bundle for Firebase App Hosting.
# See: https://github.com/firebase/apphosting-adapters

version: v1

runConfig:
  runCommand: node build
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10

outputFiles:
  serverApp:
    include:
      - build
      - package.json
      - package-lock.json
      - drizzle

metadata:
  framework: sveltekit
  adapterPackageName: "@sveltejs/adapter-node"

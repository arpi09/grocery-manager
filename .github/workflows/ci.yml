# Fast CI on every push/PR to master — no E2E, no deploy (~3–5 min)
# Deploy: Actions → "Deploy to production" (see docs/DEPLOY.md)

# Branch protection status check: pr-gate / pr-gate

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-gate:
    uses: ./.github/workflows/reusable-quality.yml
    with:
      run_audit: true
      upload_build_artifact: true

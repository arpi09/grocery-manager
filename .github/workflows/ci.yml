# Fast CI on every push/PR to master — no E2E, no deploy (~3–5 min)
# Deploy: Actions → "Deploy to production" (see docs/DEPLOY.md)

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - run: npm run lint
      - run: npm run check:locales
      - run: npm run check
        env:
          PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      - run: npm test
      - run: npm run test:receipt-fixtures
      - run: npm run test:integration
        env:
          USE_PGLITE: 'true'
      - run: npm run build
        env:
          DATABASE_URL: postgresql://pantry:pantry@localhost:5432/pantry
          USE_PGLITE: 'true'
          PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA

      - name: npm audit (runtime critical/high)
        run: npm audit --omit=dev --audit-level=high

# Manual production deploy â€” quality ? e2e ? Firebase App Hosting ? prod smoke
# Trigger: Actions ? "Deploy to production"
# Required secret: FIREBASE_TOKEN (npx firebase login:ci)

name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch or tag) to deploy
        required: false
        default: master
        type: string
      sha:
        description: Commit SHA (overrides ref when set)
        required: false
        type: string
      skip_e2e:
        description: HOTFIX ONLY â€” skip E2E (requires hotfix_confirm=hotfix)
        required: false
        default: false
        type: boolean
      hotfix_confirm:
        description: 'When skip_e2e=true, type exactly: hotfix'
        required: false
        type: string
  push:
    branches: [master]
    paths:
      - 'content/guides/**'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      guide_only: ${{ steps.manual.outputs.guide_only || steps.check.outputs.guide_only }}

    steps:
      - name: Manual deploy â€” always run full pipeline
        if: github.event_name == 'workflow_dispatch'
        id: manual
        run: echo "guide_only=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: github.event_name == 'push'
        with:
          fetch-depth: 0

      - name: Verify guide-only commit
        if: github.event_name == 'push'
        id: check
        run: |
          set -euo pipefail

          if git rev-parse -q --verify HEAD^2 >/dev/null 2>&1; then
            changed=$(git diff --name-only HEAD^1 HEAD^2 HEAD)
          else
            changed=$(git diff-tree --no-commit-id --name-only -r HEAD)
          fi

          if [ -z "$changed" ]; then
            echo "guide_only=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No changed files in commit â€” skipping deploy."
            exit 0
          fi

          guide_only=true
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              content/guides/*) ;;
              *)
                guide_only=false
                break
                ;;
            esac
          done <<< "$changed"

          if [ "$guide_only" = "true" ]; then
            echo "guide_only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Guide-only commit â€” running full deploy pipeline."
          else
            echo "guide_only=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Mixed commit (not only content/guides/**) â€” skipping auto-deploy. Run manual deploy for releases."
          fi

  validate-inputs:
    name: validate deploy inputs
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Validate hotfix skip_e2e inputs
        run: |
          set -euo pipefail
          skip_e2e="${{ inputs.skip_e2e }}"
          hotfix_confirm="${{ inputs.hotfix_confirm }}"
          if [ "$skip_e2e" = "true" ] || [ "$skip_e2e" = "True" ]; then
            if [ "$hotfix_confirm" != "hotfix" ]; then
              echo "::error::skip_e2e requires hotfix_confirm input set to exactly: hotfix"
              exit 1
            fi
            echo "::warning::HOTFIX deploy â€” E2E will be skipped. Document reason in commit/chat."
          fi

  resolve-artifact:
    name: resolve CI artifact
    needs: [gate, validate-inputs]
    if: >
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       (needs.gate.result == 'success' && needs.gate.outputs.guide_only == 'true')) &&
      (needs.validate-inputs.result == 'success' || needs.validate-inputs.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_ci_artifact: ${{ steps.try-artifact.outputs.has_ci_artifact }}
      deploy_sha: ${{ steps.deploy-sha.outputs.sha }}
      ci_run_id: ${{ steps.try-artifact.outputs.ci_run_id }}
      artifact_id: ${{ steps.try-artifact.outputs.artifact_id }}

    steps:
      - name: Resolve deploy commit SHA
        id: deploy-sha
        env:
          DEPLOY_REF: ${{ github.event_name == 'push' && github.ref_name || (inputs.sha == '' && inputs.ref || '') }}
          DEPLOY_SHA_INPUT: ${{ github.event_name == 'push' && github.sha || inputs.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -n "${DEPLOY_SHA_INPUT:-}" ]; then
            sha="$DEPLOY_SHA_INPUT"
          elif [ -n "${DEPLOY_REF:-}" ]; then
            sha=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${DEPLOY_REF}" --jq .sha)
          else
            sha="${GITHUB_SHA}"
          fi
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "Deploy target SHA: ${sha}"

      - name: Verify green CI quality on same SHA (G1b)
        env:
          DEPLOY_SHA: ${{ steps.deploy-sha.outputs.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Checking CI quality check-run for commit ${DEPLOY_SHA}â€¦"
          conclusion=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${DEPLOY_SHA}/check-runs" \
            --paginate \
            --jq '[.check_runs[] | select(.name == "quality" or .name == "quality / quality") | select(.conclusion == "success")] | sort_by(.started_at) | last | .conclusion // "missing"')
          status=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${DEPLOY_SHA}/check-runs" \
            --paginate \
            --jq '[.check_runs[] | select(.name == "quality" or .name == "quality / quality") | select(.conclusion == "success")] | sort_by(.started_at) | last | .status // "missing"')
          echo "quality check-run: status=${status} conclusion=${conclusion}"
          if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
            echo "::error::No successful CI quality check-run on ${DEPLOY_SHA}. Wait for CI on master or fix failures before deploy."
            exit 1
          fi
          echo "CI quality passed on ${DEPLOY_SHA}."

      - name: Try resolve CI sveltekit-build artifact
        id: try-artifact
        env:
          DEPLOY_SHA: ${{ steps.deploy-sha.outputs.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          has=false
          run_id=""
          artifact_id=""

          run_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${DEPLOY_SHA}&status=completed&per_page=20" \
            --jq '[.workflow_runs[] | select(.conclusion == "success")] | sort_by(.created_at) | last | .id // empty')

          if [ -n "$run_id" ]; then
            artifact_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts" \
              --jq '[.artifacts[] | select(.name == "sveltekit-build" and .expired == false)] | .[0].id // empty')
            if [ -n "$artifact_id" ]; then
              has=true
              echo "::notice::Reusing sveltekit-build from CI run ${run_id} (artifact ${artifact_id})."
            else
              echo "::notice::CI run ${run_id} has no active sveltekit-build artifact â€” will run full quality."
            fi
          else
            echo "::notice::No successful CI run on ${DEPLOY_SHA} â€” will run full quality."
          fi

          echo "has_ci_artifact=${has}" >> "$GITHUB_OUTPUT"
          echo "ci_run_id=${run_id}" >> "$GITHUB_OUTPUT"
          echo "artifact_id=${artifact_id}" >> "$GITHUB_OUTPUT"

  quality-full:
    name: quality (full build)
    needs: [resolve-artifact]
    if: >
      always() &&
      needs.resolve-artifact.result == 'success' &&
      needs.resolve-artifact.outputs.has_ci_artifact != 'true'
    uses: ./.github/workflows/reusable-quality.yml
    with:
      upload_build_artifact: true
      verify_ci_sha: false
      deploy_ref: ${{ github.event_name == 'push' && github.ref_name || (inputs.sha == '' && inputs.ref || '') }}
      deploy_sha: ${{ needs.resolve-artifact.outputs.deploy_sha }}

  quality-reuse:
    name: quality (reuse CI artifact)
    needs: [resolve-artifact]
    if: >
      always() &&
      needs.resolve-artifact.result == 'success' &&
      needs.resolve-artifact.outputs.has_ci_artifact == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-artifact.outputs.deploy_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Download sveltekit-build from CI workflow run
        env:
          ARTIFACT_ID: ${{ needs.resolve-artifact.outputs.artifact_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p build
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" > artifact.zip
          unzip -q artifact.zip -d build/
          rm artifact.zip
          echo "Downloaded CI artifact into build/ ($(find build -type f | wc -l) files)."

      - name: Client bundle guard on reused build
        run: npm run check:client-bundle

      - uses: actions/upload-artifact@v7
        with:
          name: sveltekit-build
          path: build/
          retention-days: 1

  e2e:
    name: e2e (${{ matrix.shard }}/3)
    needs: [quality-full, quality-reuse]
    if: >
      always() &&
      (needs.quality-full.result == 'success' || needs.quality-reuse.result == 'success') &&
      !(
        github.event_name == 'workflow_dispatch' &&
        (inputs.skip_e2e == true || inputs.skip_e2e == 'true') &&
        inputs.hotfix_confirm == 'hotfix'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'push' && github.sha || (inputs.sha || inputs.ref) }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: sveltekit-build
          path: build/

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - run: npm run test:e2e -- --shard=${{ matrix.shard }}/3
        env:
          USE_PGLITE: 'true'
          ADMIN_EMAIL: e2e-admin@example.com
          ADMIN_PASSWORD: e2e-ci-password
          PUBLIC_ORIGIN: http://localhost:5190
          PLAYWRIGHT_PORT: '5190'
          TURNSTILE_SKIP: 'true'
          TURNSTILE_BYPASS: 'true'
          EMAIL_VERIFICATION_SKIP: 'true'
          E2E_MOCK_AI: 'true'
          PUBLIC_E2E_DISABLE_POST_SURVEY: 'true'
          CI: 'true'

  deploy:
    name: deploy
    needs: [quality-full, quality-reuse, e2e]
    if: >
      always() &&
      (needs.quality-full.result == 'success' || needs.quality-reuse.result == 'success') &&
      (
        needs.e2e.result == 'success' ||
        (
          github.event_name == 'workflow_dispatch' &&
          (inputs.skip_e2e == true || inputs.skip_e2e == 'true') &&
          inputs.hotfix_confirm == 'hotfix' &&
          needs.e2e.result == 'skipped'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    outputs:
      skipped: ${{ steps.deploy-gate.outputs.skipped }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'push' && github.sha || (inputs.sha || inputs.ref) }}

      - name: Resolve Firebase deploy skip
        id: deploy-gate
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "${FIREBASE_TOKEN:-}" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "::notice::FIREBASE_TOKEN is not set - quality and E2E passed but deploy was skipped."
            echo "Add FIREBASE_TOKEN under Settings â†’ Secrets and variables â†’ Actions,"
            echo "or deploy locally: npm run deploy:firebase"
            echo "See docs/DEPLOY.md and docs/FIREBASE_DEPLOY.md"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy App Hosting backend
        if: steps.deploy-gate.outputs.skipped != 'true'
        run: npx firebase-tools@latest deploy --only apphosting:home-pantry --non-interactive --project home-pantry-4bee5
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}


      - name: Smoke test production URLs
        if: steps.deploy-gate.outputs.skipped != 'true'
        run: bash scripts/smoke-prod-urls.sh
        env:
          BASE_URL: ${{ vars.PRODUCTION_URL || 'https://skaffu.com' }}

      - name: Check prod auth smoke credentials
        if: steps.deploy-gate.outputs.skipped != 'true'
        id: smoke-auth-creds
        env:
          SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
        run: |
          if [ -n "${SMOKE_ADMIN_EMAIL:-}" ] && [ -n "${SMOKE_ADMIN_PASSWORD:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SMOKE_ADMIN_EMAIL / SMOKE_ADMIN_PASSWORD not set â€” skipping authenticated prod smoke."
          fi

      - uses: actions/setup-node@v6
        if: (steps.smoke-auth-creds.outputs.configured == 'true') && steps.deploy-gate.outputs.skipped != 'true'
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies for prod auth smoke
        if: (steps.smoke-auth-creds.outputs.configured == 'true') && steps.deploy-gate.outputs.skipped != 'true'
        run: npm ci

      - name: Get Playwright version
        if: (steps.smoke-auth-creds.outputs.configured == 'true') && steps.deploy-gate.outputs.skipped != 'true'
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        if: (steps.smoke-auth-creds.outputs.configured == 'true') && steps.deploy-gate.outputs.skipped != 'true'
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: (steps.smoke-auth-creds.outputs.configured == 'true' && steps.playwright-cache.outputs.cache-hit != 'true') && steps.deploy-gate.outputs.skipped != 'true'
        run: npx playwright install --with-deps chromium

      - name: Authenticated prod smoke (Playwright /hem)
        if: (steps.smoke-auth-creds.outputs.configured == 'true') && steps.deploy-gate.outputs.skipped != 'true'
        run: npm run smoke:prod-auth
        env:
          BASE_URL: ${{ vars.PRODUCTION_URL || 'https://skaffu.com' }}
          PLAYWRIGHT_BASE_URL: ${{ vars.PRODUCTION_URL || 'https://skaffu.com' }}
          SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          CI: 'true'

      - name: Notify deploy success
        if: success() && steps.deploy-gate.outputs.skipped != 'true'
        continue-on-error: true
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_NOTIFY_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.DEPLOY_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.DEPLOY_TELEGRAM_CHAT_ID }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          set -euo pipefail

          if [ -z "${WEBHOOK_URL:-}" ] && [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then
            echo "No deploy notify secrets configured â€” skipping."
            exit 0
          fi

          short_sha="${GITHUB_SHA:0:7}"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          prod_url="${PRODUCTION_URL:-https://skaffu.com}"
          msg="Skaffu deploy lyckades (${short_sha}) â€” smoke OK"
          if [ -n "$prod_url" ]; then
            msg="${msg} â€” ${prod_url%/}"
          fi
          msg=$(printf '%s\n%s' "$msg" "$run_url")

          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            payload=$(jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$msg" \
              '{chat_id: $chat_id, text: $text, disable_web_page_preview: true}')
            curl --fail-with-body -sS -X POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$payload"
            echo "Telegram notify sent."
          elif [ -n "${TELEGRAM_BOT_TOKEN:-}" ] || [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "::warning::Set both DEPLOY_TELEGRAM_BOT_TOKEN and DEPLOY_TELEGRAM_CHAT_ID for Telegram notify."
          fi

          if [ -z "${WEBHOOK_URL:-}" ]; then
            exit 0
          fi

          if [[ "$WEBHOOK_URL" == *"discord.com/api/webhooks"* ]]; then
            payload=$(jq -n --arg content "$msg" '{content: $content}')
            curl --fail-with-body -sS -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$payload"
          elif [[ "$WEBHOOK_URL" == *"hooks.slack.com"* ]]; then
            payload=$(jq -n --arg text "$msg" '{text: $text}')
            curl --fail-with-body -sS -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$payload"
          elif [[ "$WEBHOOK_URL" == *"ntfy.sh"* ]]; then
            curl --fail-with-body -sS -X POST "$WEBHOOK_URL" \
              -H "Title: Skaffu deploy lyckades" \
              -H "Tags: white_check_mark" \
              -H "Priority: default" \
              -d "$msg"
          else
            payload=$(jq -n \
              --arg text "$msg" \
              --arg url "$run_url" \
              --arg commit "$GITHUB_SHA" \
              '{text: $text, url: $url, commit: $commit}')
            curl --fail-with-body -sS -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$payload"
          fi
          echo "Webhook notify sent."

  verify-release:
    name: verify release completed
    needs: [gate, resolve-artifact, quality-full, quality-reuse, e2e, deploy]
    if: >
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.gate.outputs.guide_only == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Fail if E2E or deploy did not run
        run: |
          set -euo pipefail
          echo "gate=${{ needs.gate.result }} guide_only=${{ needs.gate.outputs.guide_only }}"
          echo "resolve-artifact=${{ needs.resolve-artifact.result }} quality-full=${{ needs.quality-full.result }} quality-reuse=${{ needs.quality-reuse.result }}"
          echo "e2e=${{ needs.e2e.result }} deploy=${{ needs.deploy.result }} (smoke inlined in deploy)"
          if [ "${{ needs.gate.result }}" != "success" ]; then
            echo "::error::gate job did not succeed"
            exit 1
          fi
          if [ "${{ needs.resolve-artifact.result }}" != "success" ]; then
            echo "::error::resolve-artifact job did not succeed"
            exit 1
          fi
          quality_ok=false
          if [ "${{ needs.quality-full.result }}" = "success" ]; then quality_ok=true; fi
          if [ "${{ needs.quality-reuse.result }}" = "success" ]; then quality_ok=true; fi
          if [ "$quality_ok" != "true" ]; then
            echo "::error::quality did not succeed (full=${{ needs.quality-full.result }} reuse=${{ needs.quality-reuse.result }})"
            exit 1
          fi
          hotfix_skip="${{ github.event_name == 'workflow_dispatch' && (inputs.skip_e2e == true || inputs.skip_e2e == 'true') && inputs.hotfix_confirm == 'hotfix' }}"
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            if [ "$hotfix_skip" = "true" ] && [ "${{ needs.deploy.result }}" = "success" ]; then
              echo "::warning::HOTFIX deploy â€” E2E skipped but deploy and smoke passed."
            else
              echo "::error::E2E did not run or failed (result=${{ needs.e2e.result }}) â€” prod was NOT released"
              exit 1
            fi
          fi
          if [ "${{ needs.deploy.result }}" != "success" ]; then
            echo "::error::deploy job did not succeed"
            exit 1
          fi
          echo "Release pipeline completed: quality, E2E, deploy, and smoke all succeeded."



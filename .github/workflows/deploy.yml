# Manual production deploy - pr-gate -> tiered e2e -> pre-deploy verify -> Firebase -> post-deploy sanity
# Trigger: Actions -> "Deploy to production"
# Required secret: FIREBASE_TOKEN (npx firebase login:ci)

name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch or tag) to deploy
        required: false
        default: master
        type: string
      sha:
        description: Commit SHA (overrides ref when set)
        required: false
        type: string
      deploy_tier:
        description: 'auto | fast | full | hotfix - E2E depth (auto uses path-tier on SHA)'
        required: false
        default: auto
        type: choice
        options:
          - auto
          - fast
          - full
          - hotfix
      hotfix_reason:
        description: 'Required when deploy_tier=hotfix - logged in workflow summary for audit'
        required: false
        type: string
  push:
    branches: [master]
    paths:
      - 'content/guides/**'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      guide_only: ${{ steps.manual.outputs.guide_only || steps.check.outputs.guide_only }}

    steps:
      - name: Manual deploy - always run full pipeline
        if: github.event_name == 'workflow_dispatch'
        id: manual
        run: echo "guide_only=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: github.event_name == 'push'
        with:
          fetch-depth: 0

      - name: Verify guide-only commit
        if: github.event_name == 'push'
        id: check
        run: |
          set -euo pipefail

          if git rev-parse -q --verify HEAD^2 >/dev/null 2>&1; then
            changed=$(git diff --name-only HEAD^1 HEAD^2 HEAD)
          else
            changed=$(git diff-tree --no-commit-id --name-only -r HEAD)
          fi

          if [ -z "$changed" ]; then
            echo "guide_only=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No changed files in commit - skipping deploy."
            exit 0
          fi

          guide_only=true
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              content/guides/*) ;;
              *)
                guide_only=false
                break
                ;;
            esac
          done <<< "$changed"

          if [ "$guide_only" = "true" ]; then
            echo "guide_only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Guide-only commit - running full deploy pipeline."
          else
            echo "guide_only=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Mixed commit (not only content/guides/**) - skipping auto-deploy. Run manual deploy for releases."
          fi

  validate-inputs:
    name: validate deploy inputs
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Validate deploy tier and hotfix inputs
        run: |
          set -euo pipefail
          deploy_tier="${{ inputs.deploy_tier }}"
          hotfix_reason="${{ inputs.hotfix_reason }}"

          if [ "$deploy_tier" = "hotfix" ]; then
            if [ -z "${hotfix_reason// /}" ]; then
              echo "::error::deploy_tier=hotfix requires hotfix_reason (audit trail)."
              exit 1
            fi
            echo "## Hotfix deploy" >> "$GITHUB_STEP_SUMMARY"
            echo "Reason: ${hotfix_reason}" >> "$GITHUB_STEP_SUMMARY"
            echo "::notice::Hotfix lane - critical E2E + enhanced post-deploy smoke."
          fi

  resolve-artifact:
    name: resolve CI artifact
    needs: [gate, validate-inputs]
    if: >
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       (needs.gate.result == 'success' && needs.gate.outputs.guide_only == 'true')) &&
      (needs.validate-inputs.result == 'success' || needs.validate-inputs.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_ci_artifact: ${{ steps.try-artifact.outputs.has_ci_artifact }}
      deploy_sha: ${{ steps.deploy-sha.outputs.sha }}
      ci_run_id: ${{ steps.try-artifact.outputs.ci_run_id }}
      artifact_id: ${{ steps.try-artifact.outputs.artifact_id }}

    steps:
      - name: Resolve deploy commit SHA
        id: deploy-sha
        env:
          DEPLOY_REF: ${{ github.event_name == 'push' && github.ref_name || (inputs.sha == '' && inputs.ref || '') }}
          DEPLOY_SHA_INPUT: ${{ github.event_name == 'push' && github.sha || inputs.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -n "${DEPLOY_SHA_INPUT:-}" ]; then
            sha="$DEPLOY_SHA_INPUT"
          elif [ -n "${DEPLOY_REF:-}" ]; then
            sha=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${DEPLOY_REF}" --jq .sha)
          else
            sha="${GITHUB_SHA}"
          fi
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "Deploy target SHA: ${sha}"

      - name: Verify green CI pr-gate on same SHA (G1b)
        env:
          DEPLOY_SHA: ${{ steps.deploy-sha.outputs.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Checking CI pr-gate check-run for commit ${DEPLOY_SHA}..."
          conclusion=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${DEPLOY_SHA}/check-runs" \
            --paginate \
            --jq '[.check_runs[] | select(.name == "pr-gate / pr-gate") | select(.conclusion == "success")] | sort_by(.started_at) | last | .conclusion // "missing"')
          status=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${DEPLOY_SHA}/check-runs" \
            --paginate \
            --jq '[.check_runs[] | select(.name == "pr-gate / pr-gate") | select(.conclusion == "success")] | sort_by(.started_at) | last | .status // "missing"')
          echo "pr-gate check-run: status=${status} conclusion=${conclusion}"
          if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
            echo "::error::No successful CI pr-gate check-run on ${DEPLOY_SHA}. Wait for CI on master or fix failures before deploy."
            exit 1
          fi
          echo "CI pr-gate passed on ${DEPLOY_SHA}."

      - name: Try resolve CI sveltekit-build artifact
        id: try-artifact
        env:
          DEPLOY_SHA: ${{ steps.deploy-sha.outputs.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          has=false
          run_id=""
          artifact_id=""

          run_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${DEPLOY_SHA}&status=completed&per_page=20" \
            --jq '[.workflow_runs[] | select(.conclusion == "success")] | sort_by(.created_at) | last | .id // empty')

          if [ -n "$run_id" ]; then
            artifact_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts" \
              --jq '[.artifacts[] | select(.name == "sveltekit-build" and .expired == false)] | .[0].id // empty')
            if [ -n "$artifact_id" ]; then
              has=true
              echo "::notice::Reusing sveltekit-build from CI run ${run_id} (artifact ${artifact_id})."
            else
              echo "::notice::CI run ${run_id} has no active sveltekit-build artifact - will run full quality."
            fi
          else
            echo "::notice::No successful CI run on ${DEPLOY_SHA} - will run full quality."
          fi

          echo "has_ci_artifact=${has}" >> "$GITHUB_OUTPUT"
          echo "ci_run_id=${run_id}" >> "$GITHUB_OUTPUT"
          echo "artifact_id=${artifact_id}" >> "$GITHUB_OUTPUT"

  resolve-deploy-tier:
    name: resolve deploy tier
    needs: [resolve-artifact]
    if: >
      always() &&
      needs.resolve-artifact.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      e2e_tier: ${{ steps.resolve.outputs.e2e_tier }}
      deploy_tier: ${{ steps.resolve.outputs.deploy_tier }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-artifact.outputs.deploy_sha }}

      - name: Resolve deploy tier and E2E depth
        id: resolve
        env:
          DEPLOY_SHA: ${{ needs.resolve-artifact.outputs.deploy_sha }}
        run: |
          set -euo pipefail
          input_tier="${{ github.event_name == 'workflow_dispatch' && inputs.deploy_tier || 'auto' }}"
          deploy_tier="$input_tier"

          if [ "$input_tier" = "fast" ] || [ "$input_tier" = "hotfix" ]; then
            e2e_tier="fast"
          elif [ "$input_tier" = "full" ]; then
            e2e_tier="full"
          else
            if git rev-parse -q --verify "${DEPLOY_SHA}^" >/dev/null 2>&1; then
              git diff --name-only "${DEPLOY_SHA}^" "$DEPLOY_SHA" > changed-files.txt
            else
              git diff-tree --no-commit-id --name-only -r "$DEPLOY_SHA" > changed-files.txt
            fi
            path_tier=$(node scripts/ci-path-tier.mjs < changed-files.txt | tail -n1)
            if [ "$path_tier" = "core-loop" ]; then
              e2e_tier="full"
            else
              e2e_tier="fast"
            fi
            echo "auto path-tier=${path_tier} -> e2e_tier=${e2e_tier}"
          fi

          echo "e2e_tier=${e2e_tier}" >> "$GITHUB_OUTPUT"
          echo "deploy_tier=${deploy_tier}" >> "$GITHUB_OUTPUT"
          echo "Deploy tier: ${deploy_tier}, E2E tier: ${e2e_tier}"

  quality-full:
    name: quality (full build)
    needs: [resolve-artifact]
    if: >
      always() &&
      needs.resolve-artifact.result == 'success' &&
      needs.resolve-artifact.outputs.has_ci_artifact != 'true'
    uses: ./.github/workflows/reusable-quality.yml
    with:
      upload_build_artifact: true
      verify_ci_sha: false
      deploy_ref: ${{ github.event_name == 'push' && github.ref_name || (inputs.sha == '' && inputs.ref || '') }}
      deploy_sha: ${{ needs.resolve-artifact.outputs.deploy_sha }}

  quality-reuse:
    name: quality (reuse CI artifact)
    needs: [resolve-artifact]
    if: >
      always() &&
      needs.resolve-artifact.result == 'success' &&
      needs.resolve-artifact.outputs.has_ci_artifact == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-artifact.outputs.deploy_sha }}

      - name: Download sveltekit-build from CI workflow run
        env:
          ARTIFACT_ID: ${{ needs.resolve-artifact.outputs.artifact_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p build
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" > artifact.zip
          unzip -q artifact.zip -d build/
          rm artifact.zip
          echo "Downloaded CI artifact into build/ ($(find build -type f | wc -l) files)."

      - name: Client bundle guard on reused build
        run: node scripts/check-client-bundle.mjs

      - uses: actions/upload-artifact@v7
        with:
          name: sveltekit-build
          path: build/
          retention-days: 1

  e2e-critical:
    name: e2e critical
    needs: [resolve-artifact, resolve-deploy-tier, quality-full, quality-reuse]
    if: >
      always() &&
      needs.resolve-deploy-tier.result == 'success' &&
      (needs.quality-full.result == 'success' || needs.quality-reuse.result == 'success') &&
      needs.resolve-deploy-tier.outputs.e2e_tier == 'fast'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-artifact.outputs.deploy_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: sveltekit-build
          path: build/

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - run: npm run test:e2e:critical
        env:
          USE_PGLITE: 'true'
          ADMIN_EMAIL: e2e-admin@example.com
          ADMIN_PASSWORD: e2e-ci-password
          PUBLIC_ORIGIN: http://localhost:5190
          PLAYWRIGHT_PORT: '5190'
          TURNSTILE_SKIP: 'true'
          TURNSTILE_BYPASS: 'true'
          EMAIL_VERIFICATION_SKIP: 'true'
          E2E_MOCK_AI: 'true'
          PUBLIC_E2E_DISABLE_POST_SURVEY: 'true'
          CI: 'true'

  e2e-full:
    name: e2e (${{ matrix.shard }}/3)
    needs: [resolve-artifact, resolve-deploy-tier, quality-full, quality-reuse]
    if: >
      always() &&
      needs.resolve-deploy-tier.result == 'success' &&
      (needs.quality-full.result == 'success' || needs.quality-reuse.result == 'success') &&
      needs.resolve-deploy-tier.outputs.e2e_tier == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-artifact.outputs.deploy_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: sveltekit-build
          path: build/

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - run: npm run test:e2e -- --shard=${{ matrix.shard }}/3
        env:
          USE_PGLITE: 'true'
          ADMIN_EMAIL: e2e-admin@example.com
          ADMIN_PASSWORD: e2e-ci-password
          PUBLIC_ORIGIN: http://localhost:5190
          PLAYWRIGHT_PORT: '5190'
          TURNSTILE_SKIP: 'true'
          TURNSTILE_BYPASS: 'true'
          EMAIL_VERIFICATION_SKIP: 'true'
          E2E_MOCK_AI: 'true'
          PUBLIC_E2E_DISABLE_POST_SURVEY: 'true'
          CI: 'true'

  pre-deploy-verify:
    name: pre-deploy verify
    needs: [resolve-deploy-tier, resolve-artifact, quality-full, quality-reuse, e2e-critical, e2e-full]
    if: >
      always() &&
      needs.resolve-deploy-tier.result == 'success' &&
      needs.resolve-artifact.result == 'success' &&
      (needs.quality-full.result == 'success' || needs.quality-reuse.result == 'success') &&
      (
        needs.e2e-critical.result == 'success' ||
        needs.e2e-full.result == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-artifact.outputs.deploy_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: sveltekit-build
          path: build/

      - name: Apply database migrations (pre-deploy)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::DATABASE_URL is not set in GitHub Actions secrets."
            echo "Pre-deploy migrations require GitHub secret DATABASE_URL (public IP format, not Firebase socket URL)."
            echo "See docs/CI_CD.md#database_url--agare-manuellt"
            exit 1
          fi
          npm run db:migrate
          echo "Pre-deploy migrations applied."

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Auth smoke against production build (blocks deploy on /hem SSR failure)
        run: npm run smoke:pre-deploy
        env:
          USE_PGLITE: 'true'
          ADMIN_EMAIL: e2e-admin@example.com
          ADMIN_PASSWORD: e2e-ci-password
          ORIGIN: http://localhost:5190
          PUBLIC_ORIGIN: http://localhost:5190
          PLAYWRIGHT_PORT: '5190'
          TURNSTILE_SKIP: 'true'
          TURNSTILE_BYPASS: 'true'
          EMAIL_VERIFICATION_SKIP: 'true'
          E2E_MOCK_AI: 'true'
          PUBLIC_E2E_DISABLE_POST_SURVEY: 'true'
          CI: 'true'

      - name: Production URL smoke (current prod baseline)
        run: bash scripts/smoke-prod-urls.sh
        env:
          BASE_URL: ${{ vars.PRODUCTION_URL || 'https://skaffu.com' }}
          SMOKE_DOUBLE_CHECK: ${{ needs.resolve-deploy-tier.outputs.deploy_tier == 'hotfix' && 'true' || 'false' }}

  deploy:
    name: deploy
    needs: [resolve-deploy-tier, resolve-artifact, quality-full, quality-reuse, e2e-critical, e2e-full, pre-deploy-verify]
    if: >
      always() &&
      needs.resolve-deploy-tier.result == 'success' &&
      needs.resolve-artifact.result == 'success' &&
      (needs.quality-full.result == 'success' || needs.quality-reuse.result == 'success') &&
      (
        needs.e2e-critical.result == 'success' ||
        needs.e2e-full.result == 'success'
      ) &&
      needs.pre-deploy-verify.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    outputs:
      skipped: ${{ steps.deploy-gate.outputs.skipped }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-artifact.outputs.deploy_sha }}

      - name: Resolve Firebase deploy skip
        id: deploy-gate
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "${FIREBASE_TOKEN:-}" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "::notice::FIREBASE_TOKEN is not set - quality and E2E passed but deploy was skipped."
            echo "Add FIREBASE_TOKEN under Settings -> Secrets and variables -> Actions,"
            echo "or deploy locally: npm run deploy:firebase"
            echo "See docs/DEPLOY.md and docs/FIREBASE_DEPLOY.md"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy App Hosting backend
        if: steps.deploy-gate.outputs.skipped != 'true'
        run: bash scripts/firebase-deploy-apphosting.sh
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Post-deploy sanity check
        if: steps.deploy-gate.outputs.skipped != 'true'
        env:
          BASE_URL: ${{ vars.PRODUCTION_URL || 'https://skaffu.com' }}
        run: |
          set -euo pipefail
          base="${BASE_URL%/}"
          body=$(mktemp)
          code=$(curl -sS -o "$body" -w "%{http_code}" --max-time 30 -L "${base}/" || echo "000")
          if [ "$code" != "200" ]; then
            echo "::error::Post-deploy sanity failed: ${base}/ returned HTTP ${code}"
            exit 1
          fi
          if grep -qi 'Internal Error' "$body" || grep -qi 'process is not defined' "$body"; then
            echo "::error::Post-deploy sanity failed: ${base}/ HTML contains error markers"
            exit 1
          fi
          echo "Post-deploy sanity OK: ${base}/ -> ${code}"

      - name: CURRENT_REALITY prod SHA hint
        if: success() && steps.deploy-gate.outputs.skipped != 'true'
        env:
          DEPLOY_SHA: ${{ needs.resolve-artifact.outputs.deploy_sha }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL || 'https://skaffu.com' }}
        run: |
          set -euo pipefail
          short_sha="${DEPLOY_SHA:0:8}"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "## CURRENT_REALITY refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Prod deploy succeeded. Update \`docs/CURRENT_REALITY.md\` **Prod SHA** row:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Prod SHA** | \`${short_sha}\` — [run ${{ github.run_id }}](${run_url}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Prod URL** | ${PRODUCTION_URL%/} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Updated** | $(date -u +%Y-%m-%d) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Coordinator: run \`.cursor/scripts/refresh-current-reality.sh\` or paste the row above. Do **not** hand-edit SHA on every nav-only touch." >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/setup-node@v6
        if: steps.deploy-gate.outputs.skipped != 'true'
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies for post-deploy auth smoke
        if: steps.deploy-gate.outputs.skipped != 'true'
        run: npm ci

      - name: Get Playwright version
        if: steps.deploy-gate.outputs.skipped != 'true'
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        if: steps.deploy-gate.outputs.skipped != 'true'
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.deploy-gate.outputs.skipped != 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Authenticated prod smoke (live /hem after deploy)
        if: steps.deploy-gate.outputs.skipped != 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -z "${SMOKE_ADMIN_EMAIL:-}" ] || [ -z "${SMOKE_ADMIN_PASSWORD:-}" ]; then
            echo "::notice::SMOKE_ADMIN_EMAIL/SMOKE_ADMIN_PASSWORD not set - skipping post-deploy auth smoke."
            exit 0
          fi
          npm run smoke:prod-auth
        env:
          BASE_URL: ${{ vars.PRODUCTION_URL || 'https://skaffu.com' }}
          PLAYWRIGHT_BASE_URL: ${{ vars.PRODUCTION_URL || 'https://skaffu.com' }}
          SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          CI: 'true'

      - name: Notify deploy success
        if: success() && steps.deploy-gate.outputs.skipped != 'true'
        continue-on-error: true
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_NOTIFY_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.DEPLOY_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.DEPLOY_TELEGRAM_CHAT_ID }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          set -euo pipefail

          if [ -z "${WEBHOOK_URL:-}" ] && [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then
            echo "No deploy notify secrets configured - skipping."
            exit 0
          fi

          short_sha="${GITHUB_SHA:0:7}"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          prod_url="${PRODUCTION_URL:-https://skaffu.com}"
          msg="Skaffu deploy lyckades (${short_sha}) - smoke OK"
          if [ -n "$prod_url" ]; then
            msg="${msg} - ${prod_url%/}"
          fi
          msg=$(printf '%s\n%s' "$msg" "$run_url")

          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            payload=$(jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$msg" \
              '{chat_id: $chat_id, text: $text, disable_web_page_preview: true}')
            curl --fail-with-body -sS -X POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$payload"
            echo "Telegram notify sent."
          elif [ -n "${TELEGRAM_BOT_TOKEN:-}" ] || [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "::warning::Set both DEPLOY_TELEGRAM_BOT_TOKEN and DEPLOY_TELEGRAM_CHAT_ID for Telegram notify."
          fi

          if [ -z "${WEBHOOK_URL:-}" ]; then
            exit 0
          fi

          if [[ "$WEBHOOK_URL" == *"discord.com/api/webhooks"* ]]; then
            payload=$(jq -n --arg content "$msg" '{content: $content}')
            curl --fail-with-body -sS -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$payload"
          elif [[ "$WEBHOOK_URL" == *"hooks.slack.com"* ]]; then
            payload=$(jq -n --arg text "$msg" '{text: $text}')
            curl --fail-with-body -sS -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$payload"
          elif [[ "$WEBHOOK_URL" == *"ntfy.sh"* ]]; then
            curl --fail-with-body -sS -X POST "$WEBHOOK_URL" \
              -H "Title: Skaffu deploy lyckades" \
              -H "Tags: white_check_mark" \
              -H "Priority: default" \
              -d "$msg"
          else
            payload=$(jq -n \
              --arg text "$msg" \
              --arg url "$run_url" \
              --arg commit "$GITHUB_SHA" \
              '{text: $text, url: $url, commit: $commit}')
            curl --fail-with-body -sS -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$payload"
          fi
          echo "Webhook notify sent."

  publish-github-release:
    name: publish GitHub release
    needs: [deploy, resolve-artifact]
    if: >
      always() &&
      needs.deploy.result == 'success' &&
      needs.resolve-artifact.result == 'success' &&
      needs.deploy.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-artifact.outputs.deploy_sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Compute CalVer tag
        id: calver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag=$(node scripts/compute-calver.mjs)
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "CalVer tag: ${tag}"

      - name: Generate release notes
        id: notes
        env:
          DEPLOY_SHA: ${{ needs.resolve-artifact.outputs.deploy_sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node scripts/generate-release-notes.mjs > release-notes.md
          echo "notes_path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          TAG: ${{ steps.calver.outputs.tag }}
          DEPLOY_SHA: ${{ needs.resolve-artifact.outputs.deploy_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --target "$DEPLOY_SHA" \
            --title "$TAG" \
            --notes-file release-notes.md
          echo "Created release ${TAG} @ ${DEPLOY_SHA}"

      - name: Update RELEASES.md on master
        env:
          CALVER_TAG: ${{ steps.calver.outputs.tag }}
          DEPLOY_SHA: ${{ needs.resolve-artifact.outputs.deploy_sha }}
          DEPLOY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin master
          git checkout master
          git pull --ff-only origin master
          node scripts/releases-append-row.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/RELEASES.md
          if git diff --staged --quiet; then
            echo "No RELEASES.md changes to commit."
            exit 0
          fi
          git commit -m "docs(releases): ${CALVER_TAG} @ ${DEPLOY_SHA:0:8} [skip ci]"
          git push origin master

      - name: Release summary
        if: always()
        env:
          TAG: ${{ steps.calver.outputs.tag }}
          DEPLOY_SHA: ${{ needs.resolve-artifact.outputs.deploy_sha }}
        run: |
          echo "## GitHub Release" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **CalVer** | \`${TAG:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **SHA** | \`${DEPLOY_SHA:0:8}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Index** | [docs/RELEASES.md](https://github.com/${{ github.repository }}/blob/master/docs/RELEASES.md) |" >> "$GITHUB_STEP_SUMMARY"

  verify-release:
    name: verify release completed
    needs: [gate, resolve-artifact, resolve-deploy-tier, quality-full, quality-reuse, e2e-critical, e2e-full, pre-deploy-verify, deploy]
    if: >
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.gate.outputs.guide_only == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Fail if E2E or deploy did not run
        run: |
          set -euo pipefail
          echo "gate=${{ needs.gate.result }} guide_only=${{ needs.gate.outputs.guide_only }}"
          echo "resolve-artifact=${{ needs.resolve-artifact.result }} resolve-deploy-tier=${{ needs.resolve-deploy-tier.result }}"
          echo "deploy_tier=${{ needs.resolve-deploy-tier.outputs.deploy_tier }} e2e_tier=${{ needs.resolve-deploy-tier.outputs.e2e_tier }}"
          echo "quality-full=${{ needs.quality-full.result }} quality-reuse=${{ needs.quality-reuse.result }}"
          echo "e2e-critical=${{ needs.e2e-critical.result }} e2e-full=${{ needs.e2e-full.result }}"
          echo "pre-deploy-verify=${{ needs.pre-deploy-verify.result }} deploy=${{ needs.deploy.result }}"
          if [ "${{ needs.gate.result }}" != "success" ]; then
            echo "::error::gate job did not succeed"
            exit 1
          fi
          if [ "${{ needs.resolve-artifact.result }}" != "success" ]; then
            echo "::error::resolve-artifact job did not succeed"
            exit 1
          fi
          if [ "${{ needs.resolve-deploy-tier.result }}" != "success" ]; then
            echo "::error::resolve-deploy-tier job did not succeed"
            exit 1
          fi
          quality_ok=false
          if [ "${{ needs.quality-full.result }}" = "success" ]; then quality_ok=true; fi
          if [ "${{ needs.quality-reuse.result }}" = "success" ]; then quality_ok=true; fi
          if [ "$quality_ok" != "true" ]; then
            echo "::error::quality did not succeed (full=${{ needs.quality-full.result }} reuse=${{ needs.quality-reuse.result }})"
            exit 1
          fi
          e2e_ok=false
          if [ "${{ needs.e2e-critical.result }}" = "success" ]; then e2e_ok=true; fi
          if [ "${{ needs.e2e-full.result }}" = "success" ]; then e2e_ok=true; fi
          if [ "$e2e_ok" != "true" ]; then
            echo "::error::E2E did not run or failed (e2e_tier=${{ needs.resolve-deploy-tier.outputs.e2e_tier }} critical=${{ needs.e2e-critical.result }} full=${{ needs.e2e-full.result }}) - prod was NOT released"
            exit 1
          fi
          if [ "${{ needs.pre-deploy-verify.result }}" != "success" ]; then
            echo "::error::pre-deploy-verify did not succeed - Firebase deploy was blocked or skipped"
            exit 1
          fi
          if [ "${{ needs.deploy.result }}" != "success" ]; then
            echo "::error::deploy job did not succeed"
            exit 1
          fi
          echo "Release pipeline completed (deploy_tier=${{ needs.resolve-deploy-tier.outputs.deploy_tier }} e2e_tier=${{ needs.resolve-deploy-tier.outputs.e2e_tier }}): pr-gate, E2E, pre-deploy verify, deploy, and post-deploy sanity all succeeded."

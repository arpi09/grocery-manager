# Weekly Sunday briefing push (shopping-v3 + briefing one-liner)
name: Weekly household briefing cron

on:
  schedule:
    # Sunday 08:00 UTC (~10:00 CET)
    - cron: '0 8 * * 0'
  workflow_dispatch:

jobs:
  weekly-household-briefing:
    name: weekly-household-briefing
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: POST /api/cron/weekly-household-briefing
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          set -euo pipefail

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::GitHub secret CRON_SECRET is not set."
            exit 1
          fi
          if [ -z "${PRODUCTION_URL:-}" ]; then
            echo "::error::GitHub repository variable PRODUCTION_URL is not set (e.g. https://skaffu.com)."
            exit 1
          fi

          base="${PRODUCTION_URL%/}"
          url="${base}/api/cron/weekly-household-briefing"
          echo "POST ${url}"

          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Accept: application/json" \
            "${url}"

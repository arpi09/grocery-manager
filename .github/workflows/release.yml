# Trunk-based release pipeline (master/main only)
# push → G1 quality → G2 e2e → G3 deploy (needs chain, no PR required)
#
# Required secret: FIREBASE_TOKEN (npx firebase login:ci)
# Runtime secrets stay in Firebase — see docs/FIREBASE_DEPLOY.md

name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: Skip E2E (emergency deploy only — use rarely)
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            source:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.cursor/**'

  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run lint
      - run: npm run check
      - run: npm test
      - run: npm run test:integration
        env:
          USE_PGLITE: 'true'
      - run: npm run build
        env:
          DATABASE_URL: postgresql://pantry:pantry@localhost:5432/pantry
          USE_PGLITE: 'true'

      - uses: actions/upload-artifact@v4
        with:
          name: sveltekit-build
          path: build/
          retention-days: 1

  e2e:
    name: e2e
    needs: [quality, changes]
    if: >
      inputs.skip_e2e != true &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.source == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: sveltekit-build
          path: build/

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
        env:
          USE_PGLITE: 'true'
          ADMIN_EMAIL: e2e-admin@example.com
          ADMIN_PASSWORD: e2e-ci-password
          PUBLIC_ORIGIN: http://localhost:5173
          TURNSTILE_SKIP: 'true'
          CI: 'true'

  deploy:
    name: deploy
    needs: [quality, e2e, changes]
    if: >
      always() &&
      needs.quality.result == 'success' &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.source == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy App Hosting backend
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::notice::FIREBASE_TOKEN is not set — quality and E2E passed but deploy was skipped."
            echo "Add FIREBASE_TOKEN under Settings → Secrets and variables → Actions,"
            echo "or deploy locally: npm run deploy:firebase"
            echo "See docs/CI_CD.md and docs/FIREBASE_DEPLOY.md"
            exit 0
          fi
          npx firebase-tools@latest deploy --only apphosting:home-pantry --non-interactive --project home-pantry-4bee5
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

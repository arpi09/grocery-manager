# Daily shopping-list push ("handla idag") for opted-in users with unchecked items.
# Independent of release.yml — no quality/e2e/deploy.
#
# GitHub: secret CRON_SECRET, variable PRODUCTION_URL (https://skaffu.com)

name: Shopping push cron

on:
  schedule:
    # Daily 06:00 UTC (~08:00 CET)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  shopping-push:
    name: shopping-push
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: POST /api/cron/shopping-push
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          set -euo pipefail

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::GitHub secret CRON_SECRET is not set."
            exit 1
          fi
          if [ -z "${PRODUCTION_URL:-}" ]; then
            echo "::error::GitHub repository variable PRODUCTION_URL is not set (e.g. https://skaffu.com)."
            exit 1
          fi

          base="${PRODUCTION_URL%/}"
          url="${base}/api/cron/shopping-push"
          echo "POST ${url}"

          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Accept: application/json" \
            "${url}"

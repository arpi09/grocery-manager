# E2E on PRs, manual trigger, or nightly — tier-aware critical vs full suite

name: E2E

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  path-tier:
    name: path-tier
    runs-on: ubuntu-latest
    outputs:
      tier: ${{ steps.tier.outputs.tier }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: tier
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "tier=nightly" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tier=core-loop" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/files" \
              --paginate --jq '.[].filename' > changed-files.txt
          else
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              git diff-tree --no-commit-id --name-only -r HEAD > changed-files.txt
            else
              git diff --name-only "$before" "${{ github.sha }}" > changed-files.txt
            fi
          fi
          tier=$(node scripts/ci-path-tier.mjs < changed-files.txt | tail -n1)
          echo "tier=${tier}" >> "$GITHUB_OUTPUT"
          echo "Path tier: ${tier}"

  pr-gate:
    uses: ./.github/workflows/reusable-quality.yml
    needs: path-tier
    if: needs.path-tier.outputs.tier != 'docs-only'
    with:
      upload_build_artifact: true

  e2e-critical:
    name: e2e critical
    needs: [path-tier, pr-gate]
    if: >
      always() &&
      needs.path-tier.outputs.tier == 'low-risk' &&
      needs.pr-gate.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: sveltekit-build
          path: build/
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:critical
        env:
          USE_PGLITE: 'true'
          ADMIN_EMAIL: e2e-admin@example.com
          ADMIN_PASSWORD: e2e-ci-password
          PUBLIC_ORIGIN: http://localhost:5190
          PLAYWRIGHT_PORT: '5190'
          TURNSTILE_SKIP: 'true'
          TURNSTILE_BYPASS: 'true'
          EMAIL_VERIFICATION_SKIP: 'true'
          E2E_MOCK_AI: 'true'
          PUBLIC_E2E_DISABLE_POST_SURVEY: 'true'
          CI: 'true'

  e2e-full:
    name: e2e (${{ matrix.shard }}/3)
    needs: [path-tier, pr-gate]
    if: >
      always() &&
      (needs.path-tier.outputs.tier == 'core-loop' || needs.path-tier.outputs.tier == 'nightly') &&
      needs.pr-gate.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: sveltekit-build
          path: build/
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:full -- --shard=${{ matrix.shard }}/3
        env:
          USE_PGLITE: 'true'
          ADMIN_EMAIL: e2e-admin@example.com
          ADMIN_PASSWORD: e2e-ci-password
          PUBLIC_ORIGIN: http://localhost:5190
          PLAYWRIGHT_PORT: '5190'
          TURNSTILE_SKIP: 'true'
          TURNSTILE_BYPASS: 'true'
          EMAIL_VERIFICATION_SKIP: 'true'
          E2E_MOCK_AI: 'true'
          PUBLIC_E2E_DISABLE_POST_SURVEY: 'true'
          CI: 'true'

  e2e-nightly-extra:
    name: e2e nightly extras
    needs: [path-tier, pr-gate, e2e-full]
    if: >
      always() &&
      needs.path-tier.outputs.tier == 'nightly' &&
      needs.e2e-full.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: sveltekit-build
          path: build/
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - run: npx playwright test e2e/receipt-real-fixtures.spec.ts e2e/accessibility.spec.ts e2e/mobile-visual.spec.ts
        env:
          USE_PGLITE: 'true'
          ADMIN_EMAIL: e2e-admin@example.com
          ADMIN_PASSWORD: e2e-ci-password
          PUBLIC_ORIGIN: http://localhost:5190
          PLAYWRIGHT_PORT: '5190'
          TURNSTILE_SKIP: 'true'
          TURNSTILE_BYPASS: 'true'
          EMAIL_VERIFICATION_SKIP: 'true'
          E2E_MOCK_AI: 'true'
          PUBLIC_E2E_DISABLE_POST_SURVEY: 'true'
          CI: 'true'

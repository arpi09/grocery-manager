# E2E on PRs, manual trigger, or nightly — not on every master push
# Full deploy pipeline: Actions → "Deploy to production"

name: E2E

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            source:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.cursor/**'

  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run lint
      - run: npm run check:locales
      - run: npm run check
        env:
          PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      - run: npm test
      - run: npm run test:receipt-fixtures
      - run: npm run test:integration
        env:
          USE_PGLITE: 'true'
      - run: npm run build
        env:
          DATABASE_URL: postgresql://pantry:pantry@localhost:5432/pantry
          USE_PGLITE: 'true'
          PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA

      - uses: actions/upload-artifact@v4
        with:
          name: sveltekit-build
          path: build/
          retention-days: 1

  e2e:
    name: e2e
    needs: [quality, changes]
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      needs.changes.outputs.source == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: sveltekit-build
          path: build/

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
        env:
          USE_PGLITE: 'true'
          ADMIN_EMAIL: e2e-admin@example.com
          ADMIN_PASSWORD: e2e-ci-password
          PUBLIC_ORIGIN: http://localhost:5190
          PLAYWRIGHT_PORT: '5190'
          TURNSTILE_SKIP: 'true'
          TURNSTILE_BYPASS: 'true'
          EMAIL_VERIFICATION_SKIP: 'true'
          E2E_MOCK_AI: 'true'
          PUBLIC_E2E_DISABLE_POST_SURVEY: 'true'
          CI: 'true'

# Nightly analytics rollup + 90-day raw retention cleanup (production only).
#
# GitHub: secret CRON_SECRET, variable PRODUCTION_URL (https://skaffu.com)

name: Analytics rollup cron

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  analytics-rollup:
    name: analytics-rollup
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: POST /api/cron/analytics-rollup
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          set -euo pipefail

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::GitHub secret CRON_SECRET is not set."
            exit 1
          fi
          if [ -z "${PRODUCTION_URL:-}" ]; then
            echo "::error::GitHub repository variable PRODUCTION_URL is not set (e.g. https://skaffu.com)."
            exit 1
          fi

          base="${PRODUCTION_URL%/}"
          url="${base}/api/cron/analytics-rollup"
          echo "POST ${url}"

          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Accept: application/json" \
            "${url}"

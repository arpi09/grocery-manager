# Firebase App Hosting â€” Cloud Run settings and environment.
# Replace placeholder values and create secrets before first deploy.
# Docs: docs/FIREBASE_DEPLOY.md

# Mounts Cloud SQL Auth Proxy Unix socket at /cloudsql/CONNECTION_NAME.
# DATABASE_URL secret must use that socket (see docs/FIREBASE_DEPLOY.md).
cloudSqlInstances:
  - home-pantry-4bee5:europe-west4:home-pantry-4bee5-instance

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

scripts:
  buildCommand: npm run build
  runCommand: node build

env:
  # Production only at runtime â€” NODE_ENV=production during BUILD makes npm ci
  # omit devDependencies (vite, SvelteKit, adapter-node) and breaks npm run build.
  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME

  # Production must use real Postgres â€” never PGlite
  - variable: USE_PGLITE
    value: "false"
    availability:
      - BUILD
      - RUNTIME

  # Public URL of the deployed app (current production). PUBLIC_ORIGIN and ORIGIN must match
  # the canonical HTTPS origin users open in the browser.
  - variable: PUBLIC_ORIGIN
    value: https://skaffu.com
    availability:
      - BUILD
      - RUNTIME

  # SvelteKit adapter-node: canonical origin for request URLs and CSRF on form actions
  - variable: ORIGIN
    value: https://skaffu.com
    availability:
      - RUNTIME

  # Legacy hosted.app — still used during skaffu.com transition; baked into kit.csrf.trustedOrigins at build
  - variable: LEGACY_APP_ORIGIN
    value: https://home-pantry--home-pantry-4bee5.europe-west4.hosted.app
    availability:
      - BUILD

  - variable: HOST
    value: 0.0.0.0
    availability:
      - RUNTIME

  # adapter-node default is 512K. Foto-runda accepts up to 3×6 MB images per request.
  - variable: BODY_SIZE_LIMIT
    value: "20M"
    availability:
      - RUNTIME

  # Build phase only â€” vite build does not connect; satisfies tools that read DATABASE_URL.
  - variable: DATABASE_URL
    value: postgresql://build:build@127.0.0.1:5432/build
    availability:
      - BUILD

  # --- Secrets (create with: firebase apphosting:secrets:set SECRET_NAME) ---
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - RUNTIME

  - variable: ADMIN_PASSWORD
    secret: ADMIN_PASSWORD
    availability:
      - RUNTIME

  - variable: OPENAI_API_KEY
    secret: OPENAI_API_KEY
    availability:
      - RUNTIME

  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability:
      - RUNTIME

  - variable: TURNSTILE_SECRET_KEY
    secret: TURNSTILE_SECRET_KEY
    availability:
      - RUNTIME

  # Stripe (Pro checkout) — see docs/STRIPE.md. Create secrets before first deploy with Stripe enabled:
  # npx firebase apphosting:secrets:set STRIPE_SECRET_KEY --project home-pantry-4bee5
  # npx firebase apphosting:secrets:grantaccess STRIPE_SECRET_KEY --backend home-pantry --project home-pantry-4bee5
  # (repeat for STRIPE_WEBHOOK_SECRET — prod signing secret from Dashboard webhook, not stripe listen)
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability:
      - RUNTIME

  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
    availability:
      - RUNTIME

  # Google OAuth — app hides Google login when unset (isGoogleOAuthConfigured).
  # Create secrets and grant backend access (see docs/FIREBASE_DEPLOY.md):
  # npx firebase apphosting:secrets:set GOOGLE_CLIENT_ID --project home-pantry-4bee5
  # npx firebase apphosting:secrets:grantaccess GOOGLE_CLIENT_ID --backend home-pantry --project home-pantry-4bee5
  # npx firebase apphosting:secrets:set GOOGLE_CLIENT_SECRET --project home-pantry-4bee5
  # npx firebase apphosting:secrets:grantaccess GOOGLE_CLIENT_SECRET --backend home-pantry --project home-pantry-4bee5
  - variable: GOOGLE_CLIENT_ID
    secret: GOOGLE_CLIENT_ID
    availability:
      - RUNTIME

  - variable: GOOGLE_CLIENT_SECRET
    secret: GOOGLE_CLIENT_SECRET
    availability:
      - RUNTIME

  - variable: VAPID_PRIVATE_KEY
    secret: VAPID_PRIVATE_KEY
    availability:
      - RUNTIME

  # --- Non-secret config (override in Firebase console if needed) ---
  # Replace with your admin login email before first deploy (or set in App Hosting â†’ Environment).
  # Seeded/updated on startup together with the ADMIN_PASSWORD secret.
  - variable: ADMIN_EMAIL
    value: arvid.pilhall@me.com
    availability:
      - RUNTIME

  # Resend sender â€” use onboarding@resend.dev until a domain is verified (see docs/EMAIL.md)
  - variable: RESEND_FROM
    value: Skaffu <hello@skaffu.com>
    availability:
      - RUNTIME

  - variable: EMAIL_SENDING_DISABLED
    value: "false"
    availability:
      - RUNTIME

  # Owner PMF weekly digest — bypasses EMAIL_SENDING_DISABLED when cron calls sendOwnerPmfDigest
  - variable: PMF_DIGEST_TO
    value: arvid.pilhall@me.com
    availability:
      - RUNTIME

  # Cloudflare Turnstile site key (public) — must match a widget whose hostnames include
  # Widget hostnames: localhost + hosted.app (+ skaffu.com after domain live); see docs/CAPTCHA.md
  - variable: PUBLIC_TURNSTILE_SITE_KEY
    value: 0x4AAAAAADZUXk7XZddZ9HBf
    availability:
      - BUILD
      - RUNTIME

  # Web Push VAPID public key — pair with VAPID_PRIVATE_KEY secret; see docs/VAPID_SETUP.md
  - variable: PUBLIC_VAPID_PUBLIC_KEY
    value: BPVXBW-3E3QzFlBeMJS-KYLr6bjleTmgqhyiTIzHzLnaQxQhuICXNeqKueFfGlGBJDgOHQK1z73CHf0xn-GJsdI
    availability:
      - BUILD
      - RUNTIME

  # Optional demo household member (omit or override in console)
  # - variable: DEFAULT_MEMBER_EMAIL
  #   value: member@example.com
  #   availability:
  #     - RUNTIME
  # - variable: DEFAULT_MEMBER_PASSWORD
  #   secret: DEFAULT_MEMBER_PASSWORD


  # Sales demo account (see docs/DEMO_ACCOUNT.md) — password secret only needed for seed/cron reset-demo
  - variable: DEMO_ACCOUNT_EMAIL
    value: demo@skaffu.com
    availability:
      - RUNTIME

  # Uncomment after setting secret and grantaccess (see docs/FIREBASE_DEPLOY.md):
  #
  # npx firebase apphosting:secrets:set DEMO_ACCOUNT_PASSWORD --project home-pantry-4bee5
  # npx firebase apphosting:secrets:grantaccess DEMO_ACCOUNT_PASSWORD --backend home-pantry --project home-pantry-4bee5
  #
  # - variable: DEMO_ACCOUNT_PASSWORD
  #   secret: DEMO_ACCOUNT_PASSWORD
  #   availability:
  #     - RUNTIME

  # Stripe Pro price IDs — from Stripe Dashboard (test or live); replace before deploy. See docs/STRIPE.md
  - variable: STRIPE_PRICE_ID_MONTHLY
    value: price_1TdyEW0xHxoOfEfBbbfRVfJp
    availability:
      - RUNTIME

  - variable: STRIPE_PRICE_ID_YEARLY
    value: price_1TdyFt0xHxoOfEfBd160VXF3
    availability:
      - RUNTIME

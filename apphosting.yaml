# Firebase App Hosting â€” Cloud Run settings and environment.
# Replace placeholder values and create secrets before first deploy.
# Docs: docs/FIREBASE_DEPLOY.md

# Mounts Cloud SQL Auth Proxy Unix socket at /cloudsql/CONNECTION_NAME.
# DATABASE_URL secret must use that socket (see docs/FIREBASE_DEPLOY.md).
cloudSqlInstances:
  - home-pantry-4bee5:europe-west4:home-pantry-4bee5-instance

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

scripts:
  buildCommand: npm run build
  runCommand: node build

env:
  # Production only at runtime â€” NODE_ENV=production during BUILD makes npm ci
  # omit devDependencies (vite, SvelteKit, adapter-node) and breaks npm run build.
  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME

  # Production must use real Postgres â€” never PGlite
  - variable: USE_PGLITE
    value: "false"
    availability:
      - BUILD
      - RUNTIME

  # Public URL of the deployed app (current production). PUBLIC_ORIGIN and ORIGIN must match
  # the canonical HTTPS origin users open in the browser. Optional future custom domain:
  # docs/CUSTOM_DOMAIN.md (homepantry.com — not connected yet).
  - variable: PUBLIC_ORIGIN
    value: https://home-pantry--home-pantry-4bee5.europe-west4.hosted.app
    availability:
      - BUILD
      - RUNTIME

  # SvelteKit adapter-node: canonical origin for request URLs and CSRF on form actions
  - variable: ORIGIN
    value: https://home-pantry--home-pantry-4bee5.europe-west4.hosted.app
    availability:
      - RUNTIME

  - variable: HOST
    value: 0.0.0.0
    availability:
      - RUNTIME

  # adapter-node default is 512K; profile avatars post resized JPEG data URLs (~700 KB max).
  - variable: BODY_SIZE_LIMIT
    value: "1M"
    availability:
      - RUNTIME

  # Build phase only â€” vite build does not connect; satisfies tools that read DATABASE_URL.
  - variable: DATABASE_URL
    value: postgresql://build:build@127.0.0.1:5432/build
    availability:
      - BUILD

  # --- Secrets (create with: firebase apphosting:secrets:set SECRET_NAME) ---
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - RUNTIME

  - variable: ADMIN_PASSWORD
    secret: ADMIN_PASSWORD
    availability:
      - RUNTIME

  - variable: OPENAI_API_KEY
    secret: OPENAI_API_KEY
    availability:
      - RUNTIME

  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability:
      - RUNTIME

  - variable: TURNSTILE_SECRET_KEY
    secret: TURNSTILE_SECRET_KEY
    availability:
      - RUNTIME

  - variable: VAPID_PRIVATE_KEY
    secret: VAPID_PRIVATE_KEY
    availability:
      - RUNTIME

  # --- Non-secret config (override in Firebase console if needed) ---
  # Replace with your admin login email before first deploy (or set in App Hosting â†’ Environment).
  # Seeded/updated on startup together with the ADMIN_PASSWORD secret.
  - variable: ADMIN_EMAIL
    value: arvid.pilhall@me.com
    availability:
      - RUNTIME

  # Resend sender â€” use onboarding@resend.dev until a domain is verified (see docs/EMAIL.md)
  - variable: RESEND_FROM
    value: Home Pantry <onboarding@resend.dev>
    availability:
      - RUNTIME

  # Cloudflare Turnstile site key (public) — must match a widget whose hostnames include
  # Widget hostnames: localhost + home-pantry--home-pantry-4bee5.europe-west4.hosted.app; see docs/CAPTCHA.md
  - variable: PUBLIC_TURNSTILE_SITE_KEY
    value: 0x4AAAAAADZUXk7XZddZ9HBf
    availability:
      - BUILD
      - RUNTIME

  # Web Push VAPID public key — pair with VAPID_PRIVATE_KEY secret; see docs/VAPID_SETUP.md
  - variable: PUBLIC_VAPID_PUBLIC_KEY
    value: BPVXBW-3E3QzFlBeMJS-KYLr6bjleTmgqhyiTIzHzLnaQxQhuICXNeqKueFfGlGBJDgOHQK1z73CHf0xn-GJsdI
    availability:
      - BUILD
      - RUNTIME

  # Optional demo household member (omit or override in console)
  # - variable: DEFAULT_MEMBER_EMAIL
  #   value: member@example.com
  #   availability:
  #     - RUNTIME
  # - variable: DEFAULT_MEMBER_PASSWORD
  #   secret: DEFAULT_MEMBER_PASSWORD


# Firebase App Hosting — Cloud Run settings and environment.
# Replace placeholder values and create secrets before first deploy.
# Docs: docs/FIREBASE_DEPLOY.md

# Mounts Cloud SQL Auth Proxy Unix socket at /cloudsql/CONNECTION_NAME.
# DATABASE_URL secret must use that socket (see docs/FIREBASE_DEPLOY.md).
cloudSqlInstances:
  - home-pantry-4bee5:europe-west4:home-pantry-4bee5-instance

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

scripts:
  buildCommand: npm run build
  runCommand: node build

env:
  # Production only at runtime — NODE_ENV=production during BUILD makes npm ci
  # omit devDependencies (vite, SvelteKit, adapter-node) and breaks npm run build.
  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME

  # Production must use real Postgres — never PGlite
  - variable: USE_PGLITE
    value: "false"
    availability:
      - BUILD
      - RUNTIME

  # Public URL of the deployed app (update after first deploy or custom domain)
  - variable: PUBLIC_ORIGIN
    value: https://home-pantry--home-pantry-4bee5.europe-west4.hosted.app
    availability:
      - BUILD
      - RUNTIME

  - variable: HOST
    value: 0.0.0.0
    availability:
      - RUNTIME

  # Build phase only — vite build does not connect; satisfies tools that read DATABASE_URL.
  - variable: DATABASE_URL
    value: postgresql://build:build@127.0.0.1:5432/build
    availability:
      - BUILD

  # --- Secrets (create with: firebase apphosting:secrets:set SECRET_NAME) ---
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - RUNTIME

  - variable: ADMIN_PASSWORD
    secret: ADMIN_PASSWORD

  - variable: OPENAI_API_KEY
    secret: OPENAI_API_KEY

  # --- Non-secret config (override in Firebase console if needed) ---
  # Replace with your admin login email before first deploy (or set in App Hosting → Environment).
  # Seeded/updated on startup together with the ADMIN_PASSWORD secret.
  - variable: ADMIN_EMAIL
    value: arvid.pilhall@me.com
    availability:
      - RUNTIME

  # Optional demo household member (omit or override in console)
  # - variable: DEFAULT_MEMBER_EMAIL
  #   value: member@example.com
  #   availability:
  #     - RUNTIME
  # - variable: DEFAULT_MEMBER_PASSWORD
  #   secret: DEFAULT_MEMBER_PASSWORD


<!doctype html>
<html lang="%pantry.locale%" data-theme="light">
	<head>
		<link id="smui-theme-css" rel="stylesheet" href="/smui.css" />
		<script>
			(function () {
				var theme = '%pantry.resolvedTheme%';
				if (theme.indexOf('%pantry.') !== 0) {
					document.documentElement.dataset.theme = theme;
					var smuiLink = document.getElementById('smui-theme-css');
					if (smuiLink) {
						smuiLink.href = theme === 'dark' ? '/smui-dark.css' : '/smui.css';
					}
				}
				var locale = '%pantry.locale%';
				if (locale === 'en' || locale === 'sv') {
					document.documentElement.lang = locale;
					return;
				}
				var match = document.cookie.match(/(?:^|; )home-pantry-locale=([^;]+)/);
				if (match && (match[1] === 'en' || match[1] === 'sv')) {
					document.documentElement.lang = match[1];
				}
			})();
		</script>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<!-- PWA_ICON_VERSION in src/lib/design/brand-colors.ts — iOS caches apple-touch-icon by URL -->
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="%sveltekit.assets%/pwa/apple-touch-icon.png?v=5"
		/>
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="theme-color" content="#2c4a3e" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#4d8f68" media="(prefers-color-scheme: dark)" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Skaffu" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

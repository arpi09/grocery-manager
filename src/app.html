<!doctype html>
<html lang="en">
	<head>
		<script>
			(function () {
				var match = document.cookie.match(/(?:^|;\s*)hp_theme_pref=([^;]+)/);
				var pref = match ? decodeURIComponent(match[1]) : '%hp.theme.pref%';
				var dark =
					pref === 'dark' ||
					(pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
				document.documentElement.dataset.theme = dark ? 'dark' : 'light';
			})();
		</script>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

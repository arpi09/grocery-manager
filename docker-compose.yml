# Postgres stack for prod-like local runs. Default dev uses PGlite (USE_PGLITE=true) — no docker-compose needed.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pantry
      POSTGRES_PASSWORD: pantry
      POSTGRES_DB: pantry
    ports:
      - '5432:5432'
    volumes:
      - pantry_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pantry -d pantry']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    environment:
      DATABASE_URL: postgresql://pantry:pantry@db:5432/pantry
    command: npm run db:migrate
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://pantry:pantry@db:5432/pantry
      PUBLIC_ORIGIN: http://localhost:3000
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pantry_data:
